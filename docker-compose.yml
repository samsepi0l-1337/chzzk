services:
  paper:
    build:
      context: .
      dockerfile: docker/paper.Dockerfile
    environment:
      EULA: ${EULA:-false}
      MINECRAFT_WEBHOOK_SECRET: ${MINECRAFT_WEBHOOK_SECRET:?MINECRAFT_WEBHOOK_SECRET is required}
      MINECRAFT_WEBHOOK_PORT: 29371
      MINECRAFT_WEBHOOK_PATH: /chzzk/donations
    ports:
      - "25565:25565"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:29371/chzzk/donations/health"]
      interval: 5s
      timeout: 3s
      retries: 30
      start_period: 30s
    volumes:
      - paper-data:/server

  bridge:
    build:
      context: .
      dockerfile: docker/bridge.Dockerfile
    env_file:
      - path: .env
        required: false
    environment:
      CHZZK_TOKEN_STORE: /data/.chzzk-tokens.json
      MINECRAFT_WEBHOOK_SECRET: ${MINECRAFT_WEBHOOK_SECRET:?MINECRAFT_WEBHOOK_SECRET is required}
      MINECRAFT_WEBHOOK_HEALTH_URL: http://paper:29371/chzzk/donations/health
      MINECRAFT_WEBHOOK_URL: http://paper:29371/chzzk/donations
    depends_on:
      paper:
        condition: service_healthy
    volumes:
      - bridge-data:/data

volumes:
  paper-data:
  bridge-data:
