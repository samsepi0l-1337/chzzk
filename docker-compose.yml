services:
  paper:
    build:
      context: .
      dockerfile: docker/paper.Dockerfile
    environment:
      EULA: ${EULA:-false}
      MINECRAFT_WEBHOOK_SECRET: ${MINECRAFT_WEBHOOK_SECRET:-replace-with-shared-secret}
      MINECRAFT_WEBHOOK_PORT: 29371
      MINECRAFT_WEBHOOK_PATH: /chzzk/donations
    ports:
      - "25565:25565"
      - "29371:29371"
    volumes:
      - paper-data:/server

  bridge:
    build:
      context: .
      dockerfile: docker/bridge.Dockerfile
    env_file:
      - path: .env
        required: false
    environment:
      CHZZK_TOKEN_STORE: /data/.chzzk-tokens.json
      MINECRAFT_WEBHOOK_SECRET: ${MINECRAFT_WEBHOOK_SECRET:-replace-with-shared-secret}
      MINECRAFT_WEBHOOK_URL: http://paper:29371/chzzk/donations
    depends_on:
      - paper
    volumes:
      - bridge-data:/data

volumes:
  paper-data:
  bridge-data:
